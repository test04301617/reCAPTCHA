<script>
     // Salesforce用タイムスタンプ
     document.addEventListener('DOMContentLoaded', function () {
        // 500msごとに実行
        const INTERVAL = 500;

        function updateTimestamp() {
           // reCAPTCHAのレスポンス（ユーザーがチェックしたかどうか）
           const response = document.getElementById('g-recaptcha-response');
           // Salesforceのcaptcha_settings(hidden項目)
           const captchaSettings = document.querySelector('input[name="captcha_settings"]');

           // 要素が存在しない場合は処理しない
           if (!response || !captchaSettings) return;

           // reCAPTCHA未入力時のみタイムスタンプ更新
           if (!response.value) {
              try {
                 // JSONとしてパース
                 const settings = JSON.parse(captchaSettings.value);
                 // 現在時刻（ミリ秒）をtsにセット
                 settings.ts = new Date().getTime();
                 // 再度hidden項目に書き戻す
                 captchaSettings.value = JSON.stringify(settings);
              } catch (e) {
                 // JSON形式が壊れていた場合のエラー
                 console.error('captcha_settings parse error:', e);
              }
           }
        }

        // 定期実行開始
        setInterval(updateTimestamp, INTERVAL);
     });

     // reCAPTCHAバリデーション処理
     function validateRecaptcha() {
        // reCAPTCHAのレスポンス
        const response = document.getElementById('g-recaptcha-response');
        // 赤枠を付けるためのラッパー要素
        const recaptchaBox = document.getElementById('recaptcha-container');
        // エラーメッセージ表示用
        let errorMessage = document.getElementById('recaptcha-error');

        // 必須要素が取れない場合は送信停止
        if (!response || !recaptchaBox) return false;

        // 未入力チェックし、エラーメッセージや赤枠表示
        if (!response.value) {
           if (errorMessage) {
              errorMessage.style.display = 'block';
           }

           recaptchaBox.classList.add('error');

           // 画面中央へスクロール
           recaptchaBox.scrollIntoView({
              behavior: 'smooth',
              block: 'center'
           });

           return false;
        // エラーメッセージや赤枠非表示
        } else {
           if (errorMessage) {
              errorMessage.style.display = 'none';
           }
           recaptchaBox.classList.remove('error');
           return true;
        }
     }

     (function () {
        //フォーム全体, 送信ボタン, 送信完了メッセージ, エラーメッセージ取得
        const form = document.getElementById('webToCaseForm');
        const submitButton = document.getElementById('submitButton');
        const thanksMessage = document.getElementById('thanksMessage');
        const formError = document.getElementById('formError');

        //電話番号欄, ご相談の種類, 件名取得
        const phone = document.getElementById('phone');
        const typeSelect = document.getElementById('type');
        const subjectInput = document.getElementById('subject');

        //二重送信防止用に送信フラグ
        let isSubmitting = false;

        // 件名マップ（ご相談の種類の値 → 件名の変換表）
        const subjectMap = {
           "まず相談したい": "【相談】",
           "詳しい料金を知りたい": "【料金詳細】",
           "デモが見たい": "【デモ依頼】",
           "事例が知りたい": "【事例要求】",
           "資料が欲しい": "【資料請求】",
           "その他": "【その他】"
        };

        // ① 「ご相談の種類」の値が変わったときに選択内容に応じて件名をセット(該当なしなら【お問い合わせ】)
        typeSelect.addEventListener('change', function () {
           subjectInput.value = subjectMap[typeSelect.value] || "【お問い合わせ】";
        });

        // 送信ボタン押下で実行
        form.addEventListener('submit', function (e) {

           // ★ここ追加：reCAPTCHAチェック（最重要）
           if (!validateRecaptcha()) {
              e.preventDefault();
              return;
           }

           //前回のエラーを消す
           formError.style.display = 'none';

           // 件名が空なら件名マップから補完
           if (!subjectInput.value) {
              subjectInput.value = subjectMap[typeSelect.value] || "【お問い合わせ】";
           }

           // ②requiredの検証を行い、異常があれば送信停止、エラーを表示
           if (!form.checkValidity()) {
              e.preventDefault();
              formError.style.display = 'block';
              form.reportValidity();
              return;
           }

           // ③電話番号は+・数字・ハイフン・カッコ・スペースのみ
           if (!/^\+?[0-9\-() ]{7,20}$/.test(phone.value)) {
              e.preventDefault();
              formError.textContent = '電話番号の形式が不正です';
              formError.style.display = 'block';
              return;
           }

           // ④メール項目以外はURLのような文字列を禁止し、異常があれば送信停止、エラーを表示
           const inputs = form.querySelectorAll('input, textarea');
           for (let el of inputs) {
              if (el.type === 'email') continue;
              if (el.value && /(https?:\/\/|www\.|[a-z0-9.-]+\.[a-z]{2,})/i.test(el.value)) {
                 e.preventDefault();
                 formError.textContent = 'URLは入力できません';
                 formError.style.display = 'block';
                 return;
              }
           }

          // ⑤送信制限30秒(同ブラウザは制限できるが、edgeとchromeなど別ブラウザは制限できない)
          const last = localStorage.getItem("lastSubmit");
          if (last && Date.now() - last < 30000) {
             e.preventDefault();
             formError.textContent = '30秒後に送信してください';
             formError.style.display = 'block';
             return;
          }
          localStorage.setItem("lastSubmit", Date.now());

          // ⑥二重送信防止
          if (isSubmitting) {
             e.preventDefault();
             return;
          }

          // 送信フラグをON、ボタン無効化、ボタンのテキスト変更
          isSubmitting = true;
          submitButton.disabled = true;
          submitButton.textContent = '送信中...';

          // ⑦送信して0.8秒後にフォームを非表示、送信完了メッセージを表示
          setTimeout(function () {
            form.style.display = 'none';
            if (thanksMessage) thanksMessage.style.display = 'block';
         }, 800);
      });
     })();
</script>
