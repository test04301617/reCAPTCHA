<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://www.google.com/recaptcha/api.js"></script>
  
  <style>
    /* フォーム全体(内側余白, 角を丸く, グレーの枠線, 白の背景色) */
    .form-card {
      padding: 28px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #fff;
    }

    /* フォームのh2クラス(タイトルの下に余白, 黒の文字色, 文字サイズ) */
    .form-card h2 {
      margin: 0 0 12px;
      color: #111827;
      font-size: 24px;
    }

    /* エラーメッセージ用(初期非表示, 外側余白, 内側余白, 角を丸く, 薄い赤の枠線, 薄い赤の背景色, 濃い赤の文字色, 文字サイズ) */
    .w2c-error {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #b91c1c;
      font-size: 14px;
    }

    /* 送信完了メッセージ用(初期非表示, 外側余白, 内側余白, 角を丸く, 薄い緑の枠線, 薄い緑の背景色, 濃い緑の文字色, 文字サイズ) */
    .w2c-thanks {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #166534;
      font-size: 14px;
    }

    /* 入力項目のまとまり(各入力ブロックの下に余白) */
    .form-group {
      margin-bottom: 18px;
    }

    /* ラベルと入力欄の間に改行) */
    .form-group label {
      display: block;
    }

    /* 必須を示す※用左に余白, 赤の文字色) */
    .required {
      margin-left: 4px;
      color: #dc2626;
    }

    /* 補足説明のテキスト用(上側余白, グレーの文字色, 文字サイズ) */
    .form-note {
      margin-top: 10px;
      color: #6b7280;
      font-size: 12px;
    }

    /* reCAPTCHA本体(上側余白) */
    .recaptcha-wrapper {
       margin-top: 10px;
    }

    /* reCAPTCHAのエラーメッセージ用(下側余白, 赤の文字色, エラーメッセージ, 表示判定) */
    .recaptcha-error {
       margin-bottom: 6px;
       color: red;
       font-size: 13px;
       display: none;
    }

    /* reCAPTCHAでエラー発生時の囲みの大きさ */
    .recaptcha-box {
       display: inline-block;
    }

    /* エラー発生時の囲み本体(内側余白, 枠の角を丸く, 赤枠実線) */
    .recaptcha-box.error {
       padding: 6px;
       border-radius: 4px;
       border: 2px solid red;
    }

    /* ボタン標準(上側余白, 内側余白, 背景色, 文字色, 枠の表示, 枠の角を丸く, マウス載せたときの表示) */
    .submit-btn {
       margin-top: 16px;
       padding: 10px 16px;
       background: #0070d2;
       color : white;
       border: none;
       border-radius: 4px;
       cursor: pointer;
    }

    /* ボタンカスタム(マウス載せたときの背景色) */
    .submit-btn:hover {
       background: #005bb5;
    }

  </style>
</head>

<body>
  <div class="form-card">
    <h2>フォームからのお問い合わせ3</h2>

    <!-- エラーメッセージ -->
    <div id="formError" class="w2c-error">
       入力内容をご確認ください。
    </div>

    <!-- 送信完了メッセージ -->
    <div id="thanksMessage" class="w2c-thanks">
       お問い合わせを受け付けました。担当者よりご連絡いたします。
    </div>

    <!-- 画面遷移を見せないための hidden iframe -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <!-- フォーム開始 -->
    <form id="webToCaseForm" action="https://fun-speed-4168--dev01.sandbox.my.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DBW000003oIKz" method="POST" target="hidden_iframe">
       <input type="hidden" name="captcha_settings" value='{"keyname":"myreCAPTCHA","fallback":"true","orgId":"00DBW000003oIKz","ts":""}'>
       <!-- Salesforce Web-to-Case 必須 -->
       <input type="hidden" name="orgid" value="00DBW000003oIKz" />
       <input type="hidden" name="retURL" value="about:blank" />
      <input type="hidden" name="debug" value="1">
<input type="hidden" name="debugEmail" value="t-takawa@ndics.co.jp">

       <!-- disabled selectedで初期選択肢を再度選択できないように -->
       <div class="form-group">
          <label for="type">ご相談の種類<span class="required" >※</span></label>
          <select id="type" name="type" required>
             <option value="" disabled selected>選択してください</option>
             <option value="まず相談したい">まず相談したい</option>
             <option value="詳しい料金を知りたい">詳しい料金を知りたい</option>
             <option value="デモが見たい">デモが見たい</option>
             <option value="事例が知りたい">事例が知りたい</option>
             <option value="資料が欲しい">資料が欲しい</option>
             <option value="その他">その他</option>
          </select>
       </div>

       <!-- 非表示にする -->
       <input type="hidden" id="subject" name="subject">
       <input type="hidden" name="status" value="新規" />

       <div class="form-group">
          <label for="company">会社名<span class="required">※</span></label>
          <input id="company" name="company" maxlength="80" type="text" required />
       </div>

       <div class="form-group">
          <label for="name">お名前<span class="required">※</span></label>
          <input id="name" name="name" maxlength="80" type="text" required />
       </div>

       <div class="form-group">
          <label for="email">メールアドレス<span class="required">※</span></label>
          <input id="email" name="email" maxlength="80" type="email" required />
       </div>

       <div class="form-group">
          <label for="phone">電話番号(携帯を推奨)<span class="required">※</span></label>
          <input id="phone" name="phone" type="tel" maxlength="20" required>
       </div>

       <!-- disabled selectedで初期選択肢を再度選択できないように -->
       <div class="form-group">
          <label for="00NBW000004ncEj">従業員数<span class="required" >※</span></label>
          <select id="00NBW000004ncEj" name="00NBW000004ncEj" required>
             <option value="" disabled selected>選択してください</option>
             <option value="100～199名">100～199名</option>
             <option value="200～299名">200～299名</option>
             <option value="300～499名">300～499名</option>
             <option value="500～999名">500～999名</option>
             <option value="1000名以上">1000名以上</option>
          </select>
       </div>

       <div class="form-group">
          <label for="00NBW000004ncGL">当社を知ったきっかけ<span class="required">※</span></label>
          <textarea id="00NBW000004ncGL" name="00NBW000004ncGL" required></textarea>
       </div>

       <div class="form-group">
          <label for="description">お問い合わせ内容<span class="required">※</span></label>
          <textarea id="description" name="description" required></textarea>
       </div>

       <div class="recaptcha-wrapper">
          <div id="recaptcha-error" class="recaptcha-error">
             reCAPTCHAの確認が必要です
          </div>

          <div id="recaptcha-container" class="recaptcha-box">
             <div class="g-recaptcha" data-sitekey="6LeRStEsAAAAAMroC_FfRYYtQzJ_GxKByNOlJdEe"></div>
          </div>
       </div>

       <button type="submit" id="submitButton" class="submit-btn">送信する</button>

       <!-- 補足説明のテキスト -->
       <div class="form-note">
          ご入力いただいた内容は、お問い合わせ対応のために利用いたします。
       </div>

     </form>
  </div>

  <script>
     function timestamp() { 
        var response = document.getElementById("g-recaptcha-response"); 
        if (response == null || response.value.trim() == "") {
           var elems = JSON.parse(document.getElementsByName("captcha_settings")[0].value);
           elems["ts"] = JSON.stringify(new Date().getTime());
           document.getElementsByName("captcha_settings")[0].value = JSON.stringify(elems);
        } 
     }
     setInterval(timestamp, 500);

     // reCAPTCHAバリデーション処理
     function validateRecaptcha() {
        // reCAPTCHAのレスポンス
        const response = document.getElementById('g-recaptcha-response');
        // 赤枠を付けるためのラッパー要素
        const recaptchaBox = document.getElementById('recaptcha-container');
        // エラーメッセージ表示用
        let errorMessage = document.getElementById('recaptcha-error');

        // 必須要素が取れない場合は送信停止
        if (!response || !recaptchaBox) return false;

        // 未入力チェックし、エラーメッセージや赤枠表示
        if (!response.value) {
           if (errorMessage) {
              errorMessage.style.display = 'block';
           }

           recaptchaBox.classList.add('error');

           // 画面中央へスクロール
           recaptchaBox.scrollIntoView({
              behavior: 'smooth',
              block: 'center'
           });

           return false;
        // エラーメッセージや赤枠非表示
        } else {
           if (errorMessage) {
              errorMessage.style.display = 'none';
           }
           recaptchaBox.classList.remove('error');
           return true;
        }
     }

     (function () {
        //フォーム全体, 送信ボタン, 送信完了メッセージ, エラーメッセージ取得
        const form = document.getElementById('webToCaseForm');
        const submitButton = document.getElementById('submitButton');
        const thanksMessage = document.getElementById('thanksMessage');
        const formError = document.getElementById('formError');

        //電話番号欄, ご相談の種類, 件名取得
        const phone = document.getElementById('phone');
        const typeSelect = document.getElementById('type');
        const subjectInput = document.getElementById('subject');

        //二重送信防止用に送信フラグ
        let isSubmitting = false;

        // 件名マップ（ご相談の種類の値 → 件名の変換表）
        const subjectMap = {
           "まず相談したい": "【相談】",
           "詳しい料金を知りたい": "【料金詳細】",
           "デモが見たい": "【デモ依頼】",
           "事例が知りたい": "【事例要求】",
           "資料が欲しい": "【資料請求】",
           "その他": "【その他】"
        };

        // ① 「ご相談の種類」の値が変わったときに選択内容に応じて件名をセット(該当なしなら【お問い合わせ】)
        typeSelect.addEventListener('change', function () {
           subjectInput.value = subjectMap[typeSelect.value] || "【お問い合わせ】";
        });

        function showErrorAndScroll(message, target) {
           formError.textContent = message;
           formError.style.display = 'block';

           if (target) {
              target.scrollIntoView({
                 behavior: 'smooth',
                 block: 'center'
              });
           } else {
              formError.scrollIntoView({
                 behavior: 'smooth',
                 block: 'center'
              });
           }
        }

        function showFieldError(el, message) {
           const old = el.parentNode.querySelector('.field-error');
           if (old) old.remove();

           const error = document.createElement('div');
           error.className = 'field-error';
           error.style.color = 'red';
           error.style.fontSize = '13px';
           error.style.marginTop = '4px';
           error.textContent = message;

           el.parentNode.appendChild(error);

           el.scrollIntoView({
              behavior: 'smooth',
              block: 'center'
           });
        }

        // 送信ボタン押下で実行
        form.addEventListener('submit', function (e) {

           // フィールドエラー初期化
           document.querySelectorAll('.field-error').forEach(e => e.remove());

           //if (!validateRecaptcha()) {
           //   e.preventDefault();
             // return;
           //}

           //前回のエラーを消す
           formError.style.display = 'none';

           // 件名が空なら件名マップから補完
           if (!subjectInput.value) {
              subjectInput.value = subjectMap[typeSelect.value] || "【お問い合わせ】";
           }

           // ②requiredの検証を行い、異常があれば送信停止、エラーを表示
           if (!form.checkValidity()) {
              e.preventDefault();
              form.reportValidity();

              const firstInvalid = form.querySelector(':invalid');
              showErrorAndScroll('入力内容をご確認ください。', firstInvalid);

              return;
           }

           // ③電話番号は+・数字・ハイフン・カッコ・スペースのみ
           if (!/^\+?[0-9\-() ]{7,20}$/.test(phone.value)) {
              e.preventDefault();
              showFieldError(phone, '電話番号の形式が不正です');
              showErrorAndScroll('入力内容をご確認ください。', phone);
              return;
           }

           // ④メール項目以外はURLのような文字列を禁止し、異常があれば送信停止、エラーを表示
           const inputs = form.querySelectorAll('input[type="text"], textarea');
           for (let el of inputs) {
              if (el.type === 'email') continue;
              if (el.value && /(https?:\/\/|www\.|[a-z0-9.-]+\.[a-z]{2,})/i.test(el.value)) {
                 e.preventDefault();
                 showFieldError(el, 'URLは入力できません');
                 showErrorAndScroll('入力内容をご確認ください。', el);
                 return;
              }
           }

          // ⑤送信制限30秒(同ブラウザは制限できるが、edgeとchromeなど別ブラウザは制限できない)
          const last = localStorage.getItem("lastSubmit");
          if (last && Date.now() - last < 30000) {
             e.preventDefault();
             showErrorAndScroll('30秒後に送信してください');
             return;
          }
          localStorage.setItem("lastSubmit", Date.now());

          // ⑥二重送信防止
          if (isSubmitting) {
             e.preventDefault();
             return;
          }

          // 送信フラグをON、ボタン無効化、ボタンのテキスト変更
          isSubmitting = true;
          submitButton.disabled = true;
          submitButton.textContent = '送信中...';

          // ⑦送信して0.8秒後にフォームを非表示、送信完了メッセージを表示
          setTimeout(function () {
            form.style.display = 'none';
            if (thanksMessage) thanksMessage.style.display = 'block';
         }, 800);
      });
     })();
  </script>

</body>
</html>
